<svg width="1456" height="816" viewBox="0 0 1456 816" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a0f00;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#0f0a00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111111;stop-opacity:1" />
    </linearGradient>

    <!-- Amber glow bottom-left -->
    <radialGradient id="glowBL" cx="0%" cy="100%" r="55%">
      <stop offset="0%" style="stop-color:#D4841A;stop-opacity:0.35" />
      <stop offset="100%" style="stop-color:#D4841A;stop-opacity:0" />
    </radialGradient>

    <!-- Subtle top-right glow -->
    <radialGradient id="glowTR" cx="100%" cy="0%" r="40%">
      <stop offset="0%" style="stop-color:#D4841A;stop-opacity:0.10" />
      <stop offset="100%" style="stop-color:#D4841A;stop-opacity:0" />
    </radialGradient>

    <!-- Dot pattern -->
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#D4841A" opacity="0.18"/>
    </pattern>

    <!-- Amber line gradient -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D4841A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4841A;stop-opacity:0.1" />
    </linearGradient>

    <!-- Text glow filter -->
    <filter id="amberGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle shadow for name -->
    <filter id="nameShadow">
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#D4841A" flood-opacity="0.5"/>
    </filter>

    <!-- Logo glow -->
    <filter id="logoGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#D4841A" flood-opacity="0.6"/>
    </filter>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400;1,700;1,900&amp;family=Cormorant+Garamond:wght@300;400;500;600&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="1456" height="816" fill="url(#bgGrad)"/>
  <rect width="1456" height="816" fill="url(#glowBL)"/>
  <rect width="1456" height="816" fill="url(#glowTR)"/>

  <!-- Dot grid overlay -->
  <rect width="1456" height="816" fill="url(#dots)" opacity="0.7"/>

  <!-- Left brace decoration -->
  <text x="38" y="480" font-family="Georgia, serif" font-size="320" fill="#D4841A" opacity="0.08" font-weight="300">{</text>

  <!-- Vertical divider -->
  <rect x="720" y="100" width="1.5" height="616" fill="url(#lineGrad)" rx="1"/>

  <!-- ===== LEFT PANEL ===== -->

  <!-- Name "Alex" -->
  <text
    x="100"
    y="310"
    font-family="'Playfair Display', Georgia, serif"
    font-size="210"
    font-weight="900"
    font-style="italic"
    fill="#D4841A"
    filter="url(#nameShadow)"
  >Alex</text>

  <!-- University -->
  <text
    x="105"
    y="355"
    font-family="'Cormorant Garamond', 'JetBrains Mono', monospace"
    font-size="18"
    fill="#D4841A"
    opacity="0.7"
    letter-spacing="5"
    font-weight="500"
  >ESTGA · UNIVERSIDADE DE AVEIRO</text>

  <!-- Role title line 1 -->
  <text
    x="100"
    y="430"
    font-family="'Playfair Display', Georgia, serif"
    font-size="52"
    font-weight="700"
    fill="#FFFFFF"
  >Full-Stack Developer &amp;</text>

  <!-- Role title line 2 -->
  <text
    x="100"
    y="490"
    font-family="'Playfair Display', Georgia, serif"
    font-size="52"
    font-weight="700"
    fill="#FFFFFF"
  >Cybersecurity Analyst</text>

  <!-- Subtitle -->
  <text
    x="105"
    y="535"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="24"
    font-weight="600"
    fill="#D4841A"
  >CTO @ ImpulsoLead · Microsoft Certified</text>

  <!-- Tech stack pills -->
  <!-- Next.js -->
  <rect x="100" y="562" width="98" height="34" rx="17" fill="none" stroke="#D4841A" stroke-width="1.2" opacity="0.6"/>
  <text x="149" y="584" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13.5" fill="#D4841A" opacity="0.9" text-anchor="middle">Next.js</text>

  <!-- TypeScript -->
  <rect x="208" y="562" width="118" height="34" rx="17" fill="none" stroke="#D4841A" stroke-width="1.2" opacity="0.6"/>
  <text x="267" y="584" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13.5" fill="#D4841A" opacity="0.9" text-anchor="middle">TypeScript</text>

  <!-- Anthropic -->
  <rect x="336" y="562" width="112" height="34" rx="17" fill="none" stroke="#D4841A" stroke-width="1.2" opacity="0.6"/>
  <text x="392" y="584" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13.5" fill="#D4841A" opacity="0.9" text-anchor="middle">Anthropic</text>

  <!-- Prisma -->
  <rect x="458" y="562" width="86" height="34" rx="17" fill="none" stroke="#D4841A" stroke-width="1.2" opacity="0.6"/>
  <text x="501" y="584" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13.5" fill="#D4841A" opacity="0.9" text-anchor="middle">Prisma</text>

  <!-- Redis -->
  <rect x="554" y="562" width="78" height="34" rx="17" fill="none" stroke="#D4841A" stroke-width="1.2" opacity="0.6"/>
  <text x="593" y="584" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13.5" fill="#D4841A" opacity="0.9" text-anchor="middle">Redis</text>

  <!-- ===== RIGHT PANEL ===== -->

  <!-- CERTIFICATIONS label -->
  <text
    x="782"
    y="185"
    font-family="'JetBrains Mono', 'Courier New', monospace"
    font-size="15"
    fill="#D4841A"
    letter-spacing="4"
    opacity="0.8"
  >CERTIFICATIONS</text>

  <!-- Cert items -->
  <!-- Bullet 1 -->
  <circle cx="797" cy="225" r="3.5" fill="#D4841A"/>
  <text x="820" y="232" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="19" fill="#FFFFFF" opacity="0.9">Microsoft Full-Stack Developer</text>

  <!-- Bullet 2 -->
  <circle cx="797" cy="273" r="3.5" fill="#D4841A"/>
  <text x="820" y="280" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="19" fill="#FFFFFF" opacity="0.9">Microsoft Cybersecurity Analyst</text>

  <!-- Bullet 3 -->
  <circle cx="797" cy="321" r="3.5" fill="#D4841A"/>
  <text x="820" y="328" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="19" fill="#FFFFFF" opacity="0.9">IBM Generative AI</text>

  <!-- Bullet 4 -->
  <circle cx="797" cy="369" r="3.5" fill="#D4841A"/>
  <text x="820" y="376" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="19" fill="#FFFFFF" opacity="0.9">Duke MLOps</text>

  <!-- Bullet 5 -->
  <circle cx="797" cy="417" r="3.5" fill="#D4841A"/>
  <text x="820" y="424" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="19" fill="#FFFFFF" opacity="0.9">UoL Essential Math</text>

  <!-- BUILDING label -->
  <text
    x="797"
    y="492"
    font-family="'JetBrains Mono', 'Courier New', monospace"
    font-size="15"
    fill="#D4841A"
    letter-spacing="4"
    opacity="0.8"
  >BUILDING</text>

  <!-- Building pills -->
  <!-- B2B SaaS -->
  <rect x="782" y="508" width="118" height="40" rx="20" fill="none" stroke="#D4841A" stroke-width="1.5"/>
  <text x="841" y="533" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="15" fill="#D4841A" text-anchor="middle">B2B SaaS</text>

  <!-- Real Estate Tech -->
  <rect x="912" y="508" width="176" height="40" rx="20" fill="none" stroke="#D4841A" stroke-width="1.5"/>
  <text x="1000" y="533" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="15" fill="#D4841A" text-anchor="middle">Real Estate Tech</text>

  <!-- AI Agents -->
  <rect x="782" y="562" width="118" height="40" rx="20" fill="none" stroke="#D4841A" stroke-width="1.5"/>
  <text x="841" y="587" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="15" fill="#D4841A" text-anchor="middle">AI Agents</text>

  <!-- Claude SDK -->
  <rect x="912" y="562" width="130" height="40" rx="20" fill="none" stroke="#D4841A" stroke-width="1.5"/>
  <text x="977" y="587" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="15" fill="#D4841A" text-anchor="middle">Claude SDK</text>

  <!-- ===== LOGO top-right ===== -->
  <!-- ImpulsoLead logo dots -->
  <g filter="url(#logoGlow)" transform="translate(1270, 52)">
    <!-- 3x3 dot grid -->
    <circle cx="0"  cy="0"  r="5" fill="#D4841A"/>
    <circle cx="18" cy="0"  r="5" fill="#D4841A"/>
    <circle cx="36" cy="0"  r="5" fill="#D4841A"/>
    <circle cx="0"  cy="18" r="5" fill="#D4841A"/>
    <circle cx="18" cy="18" r="5" fill="#D4841A"/>
    <circle cx="36" cy="18" r="5" fill="#D4841A"/>
    <circle cx="0"  cy="36" r="5" fill="#D4841A"/>
    <circle cx="18" cy="36" r="5" fill="#D4841A"/>
    <circle cx="36" cy="36" r="5" fill="#D4841A"/>
  </g>
  <!-- impulso text -->
  <text
    x="1318"
    y="80"
    font-family="'Playfair Display', Georgia, serif"
    font-size="26"
    font-weight="700"
    font-style="italic"
    fill="#FFFFFF"
    text-anchor="start"
  >impulso</text>
  <!-- LEAD text -->
  <text
    x="1318"
    y="100"
    font-family="'JetBrains Mono', 'Courier New', monospace"
    font-size="13"
    fill="#D4841A"
    letter-spacing="5"
    text-anchor="start"
  >LEAD</text>

  <!-- Bottom amber line accent -->
  <rect x="0" y="810" width="1456" height="6" fill="#D4841A" opacity="0.5" rx="0"/>

</svg>
